name: Auto Tag

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip-release]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Compute next tag
        id: tag
        run: |
          set -euo pipefail
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +'%-m')
          DAY=$(date -u +%d)
          PREFIX="v${YEAR}.${MONTH}.${DAY}"

          git fetch --tags --quiet

          MAX_NN=$(git tag --list "${PREFIX}??" \
            | grep -E "^${PREFIX}[0-9]{2}$" \
            | sed -E "s|^${PREFIX}||" \
            | sort -n | tail -1 || true)
          NEXT_NN=$(printf '%02d' $(( 10#${MAX_NN:-0} + 1 )))
          TAG="${PREFIX}${NEXT_NN}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Next tag: $TAG"

      - name: Push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.tag }}" -m "Auto-tag from master @ ${GITHUB_SHA::7}"
          git push origin "${{ steps.tag.outputs.tag }}"
